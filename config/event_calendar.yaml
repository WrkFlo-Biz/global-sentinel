    - "2026-07-30"
    - "2026-09-16"
    - "2026-09-17"
    - "2026-11-04"
    - "2026-11-05"
    - "2026-12-16"
    - "2026-12-17"

# ------------------------------------------------------------------
# Non-Farm Payrolls (NFP) — First Friday of each month
# Pre-event action: hedge with VIX calls
# ------------------------------------------------------------------
nfp_releases:
  event_type: nfp_release
  pre_event_action:
    days_before: 1
    hedge_instrument: "UVXY"
    hedge_allocation_pct: 5
    description: "Add 5% UVXY hedge position one day before NFP for volatility protection"
  dates:
    - "2026-01-02"
    - "2026-02-06"
    - "2026-03-06"
