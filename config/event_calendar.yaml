# Global Sentinel P2-6 — Event Calendar with If-Then Staging
# Known upcoming events with pre-configured position adjustments.
# The conditional order engine reads this calendar and acts 1 day before each event.

schema_version: event_calendar.v1
last_updated: "2026-03-25"

# ------------------------------------------------------------------
# FOMC Meeting Dates (2026)
# Pre-event action: reduce position sizes 50%, increase cash
# ------------------------------------------------------------------
fomc_meetings:
  event_type: fomc_decision
  pre_event_action:
    days_before: 1
    reduce_position_pct: 50
    increase_cash: true
    description: "Reduce all positions by 50% one day before FOMC to limit rate decision volatility"
  dates:
    - "2026-01-28"
    - "2026-01-29"
    - "2026-03-18"
    - "2026-03-19"
    - "2026-05-06"
    - "2026-05-07"
