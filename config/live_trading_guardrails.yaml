# Global Sentinel V5.4.2 — Live Trading Guardrails
# War-session mode: widened for 15 concurrent strategies
# Kill switch + daily loss cap still enforced as hard stops

schema_version: "live_trading_guardrails.v1"

mode: "war_session"

# --- Position Sizing (widened for war volatility + multi-strategy) ---
position_limits:
  max_position_pct: 0.08              # 8% of equity per position
  max_gross_exposure_pct: 0.40        # 40% — guarded deployment with human approval
  max_single_name_pct: 0.08           # 8% max single name
  max_sector_pct: 0.50                # 50% — energy/defense will be heavy in war regime
  max_correlation_group_pct: 0.40     # 40% correlated bets limit
  max_positions: 25                   # 15 strategies may hold concurrent positions

# --- Order Controls ---
order_controls:
  max_orders_per_minute: 10           # doubled rate limit for multi-strategy
  price_collar_pct: 0.03             # reject if limit > 3% from last trade
  quote_max_age_seconds: 30          # reject if quotes older than 30s
  require_human_approval: true       # EVERY order needs manual "Y"
  day_trades_only: true              # day trades only

# --- Loss Controls ---
loss_controls:
  max_loss_daily_pct: 0.03           # 3% daily loss = auto-halt
  max_loss_daily_usd: 3000           # $3K absolute daily loss cap
  max_loss_weekly_pct: 0.05          # 5% weekly loss = full stop
  trailing_stop_pct: 0.015           # 1.5% trailing stop on all positions

# --- Kill Switch ---
kill_switch:
  enabled: true
  flatten_on_trigger: true           # close all positions immediately
  command: "python3 -m src.execution.kill_switch --flatten-all"
  telegram_notify: true

# --- Ramp Schedule (war-session already at full width) ---
ramp_schedule:
  - days_after_live: 7
    max_position_pct: 0.08
    max_gross_exposure_pct: 2.00
    require_human_approval: true
    day_trades_only: false

  - days_after_live: 14
    max_position_pct: 0.10
    max_gross_exposure_pct: 2.50
    require_human_approval: false
    day_trades_only: false

  - days_after_live: 30
    max_position_pct: 0.12
    max_gross_exposure_pct: 3.00
    require_human_approval: false

# --- Operating Mode Override ---
operating_mode:
  initial_mode: "ELEVATED"            # tighter polling for first live session
  mode_transitions_enabled: true
  auto_crisis_on_loss_breach: true    # if daily loss > 1.5%, auto-switch to CRISIS

# --- Parallel Paper Tracking ---
paper_parallel:
  enabled: true                      # run paper in parallel with live
  compare_fills: true                # track fill quality divergence
  alert_on_divergence_pct: 0.02      # alert if paper vs live diverges > 2%
