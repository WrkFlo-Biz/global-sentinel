version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
    - /sandbox/.openclaw
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
    - /sandbox/.openclaw-data

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  azure_openai:
    name: azure_openai
    endpoints:
      - host: "__AZURE_OPENAI_HOST__"
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/openai/**" }
          - allow: { method: POST, path: "/openai/**" }
    binaries:
      - { path: /usr/local/bin/openclaw }
      - { path: /usr/local/bin/node }

  telegram:
    name: telegram
    endpoints:
      - host: api.telegram.org
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/bot*/**" }
          - allow: { method: POST, path: "/bot*/**" }
    binaries:
      - { path: /usr/local/bin/node }

  github:
    name: github
    endpoints:
      - host: github.com
        port: 443
        access: full
      - host: api.github.com
        port: 443
        access: full
    binaries:
      - { path: /usr/bin/gh }
      - { path: /usr/bin/git }

  slack:
    name: slack
    endpoints:
      - host: slack.com
        port: 443
        access: full
      - host: api.slack.com
        port: 443
        access: full
      - host: hooks.slack.com
        port: 443
        access: full
      - host: wss-primary.slack.com
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/node }

  alpaca:
    name: alpaca
    endpoints:
      - host: paper-api.alpaca.markets
        port: 443
        access: full
      - host: api.alpaca.markets
        port: 443
        access: full
      - host: data.alpaca.markets
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/python3 }

  fred:
    name: fred
    endpoints:
      - host: api.stlouisfed.org
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/python3 }

  brave:
    name: brave
    endpoints:
      - host: api.search.brave.com
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/python3 }

  clawhub:
    name: clawhub
    endpoints:
      - host: clawhub.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/openclaw }

  openclaw_api:
    name: openclaw_api
    endpoints:
      - host: openclaw.ai
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/openclaw }

  openclaw_docs:
    name: openclaw_docs
    endpoints:
      - host: docs.openclaw.ai
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/openclaw }

  npm_registry:
    name: npm_registry
    endpoints:
      - host: registry.npmjs.org
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/openclaw }
      - { path: /usr/local/bin/npm }
