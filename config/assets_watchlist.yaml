  - symbol: SPY
    description: "S&P 500 ETF"
    priority: high
  - symbol: QQQ
    description: "Nasdaq 100 ETF"
    priority: high
  - symbol: EEM
    description: "Emerging Markets ETF"
    priority: medium
  - symbol: EFA
    description: "EAFE Developed Markets ETF"
    priority: medium
  - symbol: FXI
    description: "China Large-Cap ETF"
    priority: high
  - symbol: VIX
    description: "CBOE Volatility Index"
    priority: high

# --- Currencies ---
