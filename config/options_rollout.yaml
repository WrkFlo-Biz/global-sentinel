version: "1.0"
last_updated: "2026-03-06"

options:
  enabled: false
  kill_switch: true
  phase: "disabled"  # disabled | paper_single_leg | guarded_live

  # Rollout policy
  allowed_strategies:
    - medium_long
  allow_naked_short: false

  # Per-order guardrails
  max_contracts_per_order: 1
  min_open_interest: 500
  min_daily_volume: 250
  max_bid_ask_spread_pct: 2.5
  min_days_to_expiry: 7
  max_days_to_expiry: 45

  # Hard risk rails (target-state)
  max_notional_pct_equity: 1.0
  max_daily_loss_pct_equity: 1.5
  max_concurrent_positions: 4
