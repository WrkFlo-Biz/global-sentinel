      - wall_street_vol             # GS/MS vol revenue play
      - jet_fuel_squeeze            # Cascade phase: airline_margin
      - petro_inflation             # Cascade phase: food_inflation (1-3 month lag)
      - china_oil_import_shock      # Cascade phase: em_pressure
      - asia_energy_cascade         # Cascade phase: em_pressure
      - europe_pre_open             # European session gap
      - commodity_currency_divergence  # FX divergence from commodity moves

