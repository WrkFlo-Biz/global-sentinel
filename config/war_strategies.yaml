      - refining_crack_spread       # Crack spread widening — cascade phase: refinery_spread
      - inflation_hedge             # TIPS/GLD on oil >$100
      - oil_mean_reversion          # Counter-trend fade on spikes
      - zahloria_optimized           # EMA/VWAP/RSI pullback — 5x Sharpe optimized by @deltatrendtrading
