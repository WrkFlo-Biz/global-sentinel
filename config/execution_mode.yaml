# Global Sentinel — Execution Mode Configuration
# Controls dual-strategy assignment, auto/manual modes, and bot ownership

version: "1.0"
last_updated: "2026-03-06"

# --- Strategy Definitions ---
strategies:
  day_trade:
    description: "Aggressive intraday trades targeting $250+/day, flat by EOD"
    bot: "mo2darkbot"
    bot_username: "@mo2darkbot"
    holding_period: "day"
    profit_target_pct: 2.0        # Realistic intraday target (was 10%)
    stop_loss_pct: 1.0            # 2:1 R:R ratio (was 0.5%)
    trailing_stop_activation_pct: 1.0  # Activate trailing at 1% gain (was 5%)
    trailing_stop_distance_pct: 0.4    # Trail 40bps behind peak
    eod_flatten: true
    eod_flatten_time: "15:45"  # ET
    max_positions: 8              # Concentrate capital for meaningful moves
    max_orders_per_cycle: 6       # Quality over quantity
    max_side_bias_pct: 65         # Block additional same-side candidates if >65% are one direction
    max_ideas_per_cycle: 10
    time_in_force: "day"
    extended_hours: true
    # Notional-based position sizing (replaces share-count)
    position_sizing:
      method: "notional_pct"      # Size by % of equity, not share count
      base_pct_of_equity: 8.0     # 8% of equity per trade (~$8K on $100K)
      high_confidence_pct: 12.0   # 12% for high-confidence setups (~$12K)
      max_single_position_pct: 15.0  # Hard cap 15% per position
      max_gross_exposure_pct: 60.0   # Desired 60%, hard-capped at 40% by live_trading_guardrails.yaml
      min_notional: 2000          # Minimum $2K per trade
      max_qty_cap: 10000          # High sanity cap; notional/max_single_position_pct remain primary guardrails
      min_size_multiplier: 0.40   # Floor for confidence/time-window downscaling
      fail_if_price_missing: true # Block order if no valid decision price can be resolved
    # Volatility-window focus
    volatility_windows:
      opening_range_breakout:     # 9:45-10:30 ET — highest vol
        size_boost: 1.3           # 30% larger positions
        max_positions: 4
      power_hour:                 # 15:00-15:50 ET — second highest vol
        size_boost: 1.2           # 20% larger positions
        max_positions: 3
      lunch_lull:                 # 11:30-14:00 ET — avoid
        size_boost: 0.5           # Half size only
        max_positions: 1

  medium_long:
    description: "Medium to long-term holds based on macro trends"
    bot: "mo2darkbot"
    bot_username: "@mo2darkbot"
    holding_period: "swing"
    profit_target_pct: 8.0
    stop_loss_pct: 2.0
    trailing_stop_activation_pct: 3.0
    trailing_stop_distance_pct: 1.5
    eod_flatten: false
    max_positions: 30
    max_orders_per_cycle: 10
    max_ideas_per_cycle: 20
    time_in_force: "gtc"
    extended_hours: false
    position_sizing:
      method: "notional_pct"
      base_pct_of_equity: 5.0       # 5% of equity per trade (~$5K on $100K)
      high_confidence_pct: 8.0      # 8% for high-confidence macro plays (~$8K)
      max_single_position_pct: 12.0 # Hard cap 12% per position
      max_gross_exposure_pct: 80.0  # Can be more exposed for swing/long
      min_notional: 1500
      max_qty_cap: 10000
      min_size_multiplier: 0.25
      fail_if_price_missing: true

# --- Execution Mode ---
# "auto" = submit orders automatically 24/7 when optimal opportunities arise
# "manual" = send order summary + upside analysis to Telegram, wait for approval
# NOTE: These modes apply to PAPER trading accounts only.
# For LIVE trading, live_trading_guardrails.yaml OVERRIDES these settings
# and enforces require_human_approval: true regardless of what is set here.
execution_mode:
  day_trade: "auto"
  medium_long: "auto"

# --- Telegram Notifications ---
notifications:
  # Hourly position updates with P&L from entry
  hourly_position_update: true
  hourly_update_interval_minutes: 60

  # Instant alerts on new order submission
  instant_order_alerts: true

  # Include upside/profit analysis in order notifications
  include_upside_analysis: true

  # Summary includes: current price, entry price, P&L %, $ P&L, upside remaining
  position_update_fields:
    - symbol
    - strategy
    - entry_price
    - current_price
    - pnl_pct
    - pnl_usd
    - upside_target
    - stop_loss
    - hold_duration

# --- Bot Permissions ---
# When execution_mode is "manual", bots can submit orders on user approval
bot_permissions:
  mo2darkbot:
    can_submit_orders: true
    strategy: "day_trade"
    requires_approval_in_manual: true
  mo2drkbot:
    can_submit_orders: true
    strategy: "medium_long"
    requires_approval_in_manual: true
