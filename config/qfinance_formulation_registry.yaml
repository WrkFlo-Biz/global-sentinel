    backend: cvxpy
    notes: "Strong classical baseline — quantum must beat this"

  qpanda_qae_digital_option:
    problem_family: derivative_pricing_research
    encoding: amplitude_estimation_probability
    max_decision_variables: 1
    constraint_encoding: none
    ansatz: ry_probability_encoding
    optimizer: iterative_amplitude_estimation
    max_circuit_depth: 1
    default_shots: 0
    classical_comparison: black_scholes_digital
    quantum_friendly: true
    backend: qpanda_cpuqvm
    notes: "Research-only digital option pricer using Origin iterative amplitude estimation"
