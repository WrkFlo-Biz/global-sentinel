    default_shots: 1000
    classical_comparison: markowitz_milp
    quantum_friendly: true
    backend: qiskit_aer_simulator
    notes: "Qiskit Finance QAOA — cross-platform comparison backend"

  pennylane_anomaly_vqc:
    problem_family: anomaly_detection_research
    encoding: amplitude_embedding
    max_decision_variables: 16
