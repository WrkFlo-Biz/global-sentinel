# Global Sentinel V4 — Scoring Thresholds
# Changes to this file require PR review (see CODEOWNERS)
# Config is FROZEN during CRISIS mode

version: "4.0"
last_updated: "2026-03-04"

# --- Operating Mode Thresholds ---
mode_thresholds:
  normal_to_elevated: 0.35
  elevated_to_crisis: 0.65
  crisis_to_elevated: 0.55   # hysteresis: lower than entry
  elevated_to_normal: 0.25   # hysteresis: lower than entry

# --- Hysteresis ---
hysteresis:
  min_cycles_before_downgrade: 3
  min_cycles_before_upgrade: 2
  flap_detection_window_minutes: 60
  max_flaps_before_lock: 3

# --- Regime Shift Scoring Weights ---
# INSTITUTIONAL REBUILD: Boosted geopolitical, decomposed commodity_shock
# Per Citadel quant framework: inventory + supply + demand + storage + curve
regime_weights:
  geopolitical_tension: 0.22     # BOOSTED from 0.18 — core differentiator
  market_volatility: 0.14        # Slightly reduced
  yield_curve: 0.10              # Slightly reduced
  commodity_shock: 0.04          # REDUCED — decomposed into sub-signals below
  commodity_inventory: 0.04      # NEW: EIA weekly draws, storage levels
  commodity_supply_disruption: 0.04  # NEW: Hormuz AIS, OPEC, sanctions
  commodity_cascade_phase: 0.03  # NEW: Oil → shipping → refinery → airline lag
  policy_signals: 0.08           # BOOSTED from 0.07 — Fed/WH/OFAC combined
  politician_alpha: 0.09         # Unchanged — congressional trades
  currency_stress: 0.07          # Slightly reduced
  policy_uncertainty: 0.06       # Slightly reduced
  consciousness_coherence: 0.03  # REDUCED from 0.06 — experimental
  credit_spread: 0.03            # Slightly reduced
  liquidity_stress: 0.02         # Slightly reduced
  labor_disruption: 0.01         # REDUCED from 0.02 — low priority

# --- Confidence Adjustments ---
confidence:
  base_confidence: 0.80
  stale_data_penalty: 0.15       # per stale source
  conflicting_signal_penalty: 0.10
  fallback_mode_penalty: 0.20
  single_source_penalty: 0.25
  min_confidence_for_shadow_draft: 0.50

# --- Freshness Requirements ---
freshness:
  max_age_minutes:
    market_data: 15
    news_signals: 30
    macro_indicators: 1440       # 24 hours
    policy_feeds: 720            # 12 hours
  quorum_required_for_escalation: 3  # min fresh sources to escalate

# --- Shadow Execution ---
shadow:
  max_notional_per_draft_usd: 1000000
  max_drafts_per_day: 10
  require_human_approval: false
  disabled_in_crisis: true

# --- Domestic Stress Proxies ---
domestic_stress:
  policy_uncertainty_weight: 0.10
  labor_disruption_weight: 0.05
  dol_bls_lookback_days: 30
  uscis_policy_lookback_days: 90

# --- Correlation Sanity ---
correlation:
  check_interval_hours: 6
  max_pairwise_correlation: 0.95
  min_expected_sources: 4
  alert_on_correlation_break: true

# --- Dead Letter ---
dead_letter:
  max_queue_size: 1000
  retention_days: 30
