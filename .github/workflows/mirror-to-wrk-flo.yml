name: mirror to wrk-flo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Push main + tags to Wrk-Flo mirror
        env:
          MIRROR_TOKEN: ${{ secrets.WRKFLO_MIRROR_TOKEN }}
        run: |
          set -e
          REPO="${GITHUB_REPOSITORY##*/}"
          DEST="https://x-access-token:${MIRROR_TOKEN}@github.com/Wrk-Flo/${REPO}.git"
          git fetch origin "+refs/tags/*:refs/tags/*" || true
          git push --force "$DEST" main
          git push --force --tags "$DEST"
