name: CI — Lint, Test, Safety Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt flake8
      - name: Terminology guard
        run: python3 scripts/cleanup/standardize_terms.py
      - name: Select lint targets
        id: lint_targets
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          git diff --name-only "$base_sha" "$head_sha" \
            | grep -E '^(src|scripts)/.*\.py$' \
            | sort -u > /tmp/flake8_targets.txt || true

          if [ -s /tmp/flake8_targets.txt ]; then
            echo "has_targets=true" >> "$GITHUB_OUTPUT"
            echo "Lint targets:"
            cat /tmp/flake8_targets.txt
          else
            echo "has_targets=false" >> "$GITHUB_OUTPUT"
            echo "No changed Python files under src/ or scripts/."
          fi
      - name: Lint changed Python files
        if: steps.lint_targets.outputs.has_targets == 'true'
        run: xargs flake8 --max-line-length=120 --ignore=E501,W503,E701,E226,E127,E402,E203 < /tmp/flake8_targets.txt

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt -r dashboard/api/requirements.txt pytest
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
      - name: Risk gate smoke tests
        run: python3 tests/replays/risk_gate_smoke/run_risk_gate_smoke.py

  safety-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Verify no live venues
        run: |
          python -c "
          import yaml
          with open('config/venue_policies.yaml') as f:
              v = yaml.safe_load(f)
          live = v.get('live_venues', {})
          assert len(live) == 0, f'FAIL: {len(live)} live venues found!'
          assert v['policies']['live_trading_enabled'] == False, 'FAIL: live trading enabled!'
          assert v['policies']['shadow_mode_enforced'] == True, 'FAIL: shadow mode not enforced!'
          print('PASS: Safety audit — no live order paths')
          "
      - name: Verify controls exist
        run: |
          test -f control/manual_veto.json && echo "PASS: manual_veto.json exists"
          test -f control/kill_switch.json && echo "PASS: kill_switch.json exists"

  replay-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check for threshold changes
        run: |
          BASE_REF="${{ github.base_ref }}"
          git fetch origin "${BASE_REF}:refs/remotes/origin/${BASE_REF}" --depth=1
          git diff "origin/${BASE_REF}" -- config/thresholds.yaml > /tmp/threshold_diff.txt
          if [ -s /tmp/threshold_diff.txt ]; then
            echo "::warning::Threshold changes detected — replay validation recommended"
            cat /tmp/threshold_diff.txt
          fi
