name: Replay Eval (Time Windows)

on:
  schedule:
    # Nightly at 02:15 UTC
    - cron: "15 2 * * *"
  pull_request:
    branches: [main]
    paths:
      - "src/replay_runner.py"
      - "src/alpha/time_window_policy.py"
      - "config/intraday_timing_guardrails.yaml"
      - "tests/replays/time_windows/**"
      - ".github/workflows/replay-time-windows.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  replay-time-windows:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Determine pass-rate threshold by event type
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "PASS_RATE_MIN=0.70" >> $GITHUB_ENV
          else
            echo "PASS_RATE_MIN=0.85" >> $GITHUB_ENV
          fi
          echo "Using PASS_RATE_MIN=$PASS_RATE_MIN"

      - name: Syntax check replay runner + time window policy
        run: |
          python -m py_compile src/replay_runner.py
          python -m py_compile src/alpha/time_window_policy.py

      - name: Run replay runner on time-window fixtures
        run: |
          mkdir -p reports/openclaw_research
          python src/replay_runner.py \
            --repo-root . \
            --fixtures tests/replays/time_windows \
            --output reports/openclaw_research/replay_time_windows.json | tee reports/openclaw_research/replay_time_windows_stdout.txt

      - name: Enforce pass-rate threshold (time windows)
        run: |
          python - <<'PY'
          import json, os, sys
          from pathlib import Path

          p = Path("reports/openclaw_research/replay_time_windows.json")
          if not p.exists():
              print("Replay output missing:", p)
              sys.exit(1)

          data = json.loads(p.read_text())
          pass_rate = data.get("pass_rate")
          total_cases = data.get("total_cases", 0)
          status = data.get("status")
          min_required = float(os.getenv("PASS_RATE_MIN", "0.85"))

          print(f"Replay status={status} total_cases={total_cases} pass_rate={pass_rate} min_required={min_required}")

          if status not in {"ok", "no_fixtures"}:
              print("Replay status indicates failure.")
              sys.exit(1)

          if total_cases == 0:
              print("No fixtures found in time-window pack.")
              sys.exit(1)

          # Guardrail: ensure time-window policy loaded
          if data.get("time_window_policy_integrated") is not True:
              print("TimeWindowPolicyEngine is not integrated/loaded in replay runner.")
              sys.exit(1)

          if pass_rate is None or float(pass_rate) < min_required:
              print("Pass-rate threshold failed.")
              for r in data.get("results", []):
                  if not r.get("pass", False):
                      print("FAILED:", r.get("name"))
                      for chk in r.get("checks", []):
                          if not chk.get("pass", False):
                              print("  -", chk)
              sys.exit(1)

          print("Pass-rate threshold passed.")
          PY

      - name: Write replay time-window summary to job summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path(os.environ.get("GITHUB_STEP_SUMMARY", ""))
          replay_path = Path("reports/openclaw_research/replay_time_windows.json")

          lines = []
          lines.append("## Replay Time-Window Pack Summary")
          lines.append("")

          if not replay_path.exists():
              lines.append("Replay output file not found: `reports/openclaw_research/replay_time_windows.json`")
              with summary_path.open("a", encoding="utf-8") as f:
                  f.write("\n".join(lines) + "\n")
              raise SystemExit(0)

          data = json.loads(replay_path.read_text())

          status = data.get("status")
          total_cases = data.get("total_cases")
          passed_cases = data.get("passed_cases")
          failed_cases = data.get("failed_cases")
          pass_rate = data.get("pass_rate")
          avg_conf = data.get("avg_confidence")
          tw_integrated = data.get("time_window_policy_integrated")

          corr_break_count = data.get("correlation_break_count")
          shadow_blocked_count = data.get("shadow_execution_blocked_count")
          window_shadow_blocked_count = data.get("window_shadow_blocked_count", 0)
          watchlist_only_window_count = data.get("watchlist_only_window_count", 0)
          time_window_counts = data.get("time_window_counts") or {}
          effective_mode_counts = data.get("effective_mode_counts") or {}
          raw_mode_counts = data.get("raw_mode_counts") or {}

          lines.append("| Metric | Value |")
          lines.append("|---|---:|")
          lines.append(f"| Status | `{status}` |")
          lines.append(f"| Time Window Policy Integrated | `{tw_integrated}` |")
          lines.append(f"| Total Cases | {total_cases} |")
          lines.append(f"| Passed Cases | {passed_cases} |")
          lines.append(f"| Failed Cases | {failed_cases} |")
          lines.append(f"| Pass Rate | {pass_rate} |")
          lines.append(f"| Avg Confidence | {avg_conf} |")
          if corr_break_count is not None:
              lines.append(f"| Correlation Break Count | {corr_break_count} |")
          if shadow_blocked_count is not None:
              lines.append(f"| Shadow Execution Blocked Count | {shadow_blocked_count} |")
          lines.append(f"| Window Shadow Blocked Count | {window_shadow_blocked_count} |")
          lines.append(f"| Watchlist-Only Window Count | {watchlist_only_window_count} |")
          lines.append("")

          if raw_mode_counts or effective_mode_counts:
              lines.append("### Mode Counts")
              lines.append("")
              lines.append("| Type | Counts |")
              lines.append("|---|---|")
              lines.append(f"| Raw Mode Counts | `{raw_mode_counts}` |")
              lines.append(f"| Effective Mode Counts | `{effective_mode_counts}` |")
              lines.append("")

          if time_window_counts:
              lines.append("### Time Window Counts")
              lines.append("")
              lines.append("| Window | Count |")
              lines.append("|---|---:|")
              for k, v in sorted(time_window_counts.items(), key=lambda kv: str(kv[0])):
                  lines.append(f"| `{str(k).replace('|', '')}` | {v} |")
              lines.append("")

          failed_rows = []
          for result in data.get("results", []):
              if result.get("pass", True):
                  continue
              pred = result.get("prediction", {}) or {}
              tw_pol = pred.get("time_window_policy") or {}
              for chk in result.get("checks", []):
                  if chk.get("pass", True):
                      continue
                  failed_rows.append({
                      "case": result.get("name"),
                      "check": chk.get("check"),
                      "expected": chk.get("expected"),
                      "actual": chk.get("actual"),
                      "raw_mode": pred.get("mode"),
                      "effective_mode": pred.get("effective_mode"),
                      "tw_name": tw_pol.get("current_window"),
                      "prob": pred.get("regime_shift_probability"),
                      "conf": pred.get("confidence"),
                  })

          if failed_rows:
              lines.append("### Failed Checks")
              lines.append("")
              lines.append("| Case | Check | Expected | Actual | Raw Mode | Time Window | Prob | Conf |")
              lines.append("|---|---|---|---|---|---|---:|---:|")

              def esc(x):
                  return str(x).replace("|", "")

              for r in failed_rows:
                  lines.append(
                      f"| `{esc(r['case'])}` | `{esc(r['check'])}` | `{esc(r['expected'])}` | `{esc(r['actual'])}` | "
                      f"`{esc(r['raw_mode'])}` | `{esc(r['tw_name'])}` | {r['prob']} | {r['conf']} |"
                  )
          else:
              lines.append("No failed checks in time-window replay pack.")

          lines.append("")
          lines.append("<sub>Generated from `reports/openclaw_research/replay_time_windows.json`</sub>")

          with summary_path.open("a", encoding="utf-8") as f:
              f.write("\n".join(lines) + "\n")
          PY

      - name: Upload replay time-window artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replay-time-windows-artifacts
          path: |
            reports/openclaw_research/replay_time_windows.json
            reports/openclaw_research/replay_time_windows_stdout.txt
          retention-days: 14
